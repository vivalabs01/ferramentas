<style>
:root{
  --bg:#070a0f;
  --bg-2:#0b0f16;
  --card:#0e131c;
  --card-hover:#121826;
  --border:#1b2230;
  --border-hi:#2a3346;
  --border-glow:#2d3a52;
  --text:#e9eef6;
  --muted:#8a93a4;
  --muted-2:#5d6675;
  --accent-a:#2f8bff;
  --accent-b:#62d65a;
  --grad:linear-gradient(115deg,var(--accent-a),var(--accent-b));
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Manrope',sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
}
/* ambient brand glow */
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(620px 360px at 50% -6%, rgba(47,139,255,.14), transparent 70%),
    radial-gradient(520px 340px at 84% 8%, rgba(98,214,90,.10), transparent 72%),
    radial-gradient(700px 500px at 12% 30%, rgba(47,139,255,.06), transparent 75%);
}
/* faint grid texture */
body::after{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.35;
  background-image:
    linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
  background-size:46px 46px;
  mask-image:radial-gradient(circle at 50% 20%,black,transparent 80%);
}
.wrap{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:56px 24px 96px}

/* ---------- header ---------- */
.brand{display:flex;flex-direction:column;align-items:center;text-align:center;animation:rise .7s cubic-bezier(.2,.7,.2,1) both}
.brand img{width:118px;height:auto;filter:drop-shadow(0 8px 30px rgba(47,139,255,.25));margin-bottom:10px}
.kicker{
  font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:.42em;
  text-transform:uppercase;color:var(--muted-2);
  display:inline-flex;align-items:center;gap:10px;
}
.kicker::before,.kicker::after{content:"";width:26px;height:1px;background:linear-gradient(90deg,transparent,var(--border-glow))}
.kicker::after{background:linear-gradient(90deg,var(--border-glow),transparent)}

/* ---------- search ---------- */
.searchbar{
  margin:34px auto 8px;max-width:560px;position:relative;
  animation:rise .7s .06s cubic-bezier(.2,.7,.2,1) both;
}
.searchbar svg{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--muted-2)}
#q{
  width:100%;padding:15px 18px 15px 48px;border-radius:14px;
  background:var(--bg-2);border:1px solid var(--border);color:var(--text);
  font-family:'Manrope';font-size:15px;outline:none;transition:.18s;
}
#q::placeholder{color:var(--muted-2)}
#q:focus{border-color:var(--border-glow);box-shadow:0 0 0 4px rgba(47,139,255,.08),0 8px 30px rgba(0,0,0,.4)}
.hint{text-align:center;font-size:12px;color:var(--muted-2);margin-top:10px;font-family:'JetBrains Mono'}
.hint b{color:var(--muted)}

/* ---------- sections ---------- */
.sec{margin-top:54px;animation:rise .6s cubic-bezier(.2,.7,.2,1) both}
.sec-head{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.sec-ico{
  width:42px;height:42px;border-radius:12px;flex:none;display:grid;place-items:center;
  background:linear-gradient(160deg,rgba(47,139,255,.18),rgba(98,214,90,.12));
  border:1px solid var(--border-hi);color:#cfe2ff;
}
.sec-ico svg{width:20px;height:20px}
.sec-meta h2{font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;letter-spacing:.14em;text-transform:uppercase}
.sec-meta p{font-size:12.5px;color:var(--muted);margin-top:2px}
.sec-count{
  margin-left:auto;font-family:'JetBrains Mono';font-size:12px;color:var(--muted-2);
  border:1px solid var(--border);border-radius:8px;padding:3px 9px;
}

/* ---------- card grid ---------- */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:880px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.grid{grid-template-columns:1fr}.wrap{padding:40px 16px 72px}}

.card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:12px;
  position:relative;overflow:hidden;transition:transform .16s,border-color .16s,background .16s;
}
.card::after{
  content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;opacity:0;
  background:linear-gradient(120deg,rgba(47,139,255,.06),transparent 40%);transition:opacity .2s;
}
.card:hover{transform:translateY(-3px);border-color:var(--border-glow);background:var(--card-hover)}
.card:hover::after{opacity:1}
.card-top{display:flex;align-items:center;gap:12px}
.fav{
  width:34px;height:34px;border-radius:9px;flex:none;display:grid;place-items:center;
  background:var(--bg-2);border:1px solid var(--border);overflow:hidden;
  font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;color:#bcd0ee;
}
.fav img{width:20px;height:20px;border-radius:4px}
.card-name{font-weight:600;font-size:14.5px;line-height:1.25;flex:1}
.go{color:var(--muted-2);flex:none;transition:.16s}
.card:hover .go{color:var(--accent-a);transform:translate(2px,-2px)}

/* featured / destaque card */
.card.feat{
  grid-column:1 / -1;flex-direction:row;align-items:center;gap:18px;padding:18px 20px;
  border:1px solid transparent;
  background:
    linear-gradient(var(--card),var(--card)) padding-box,
    linear-gradient(115deg,var(--accent-a),var(--accent-b)) border-box;
  box-shadow:0 10px 40px -12px rgba(47,139,255,.35);
}
.card.feat::after{display:none}
.card.feat::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(440px 130px at 4% 0%,rgba(98,214,90,.10),transparent 70%);
}
.card.feat:hover{transform:translateY(-3px);box-shadow:0 16px 54px -12px rgba(47,139,255,.5)}
.feat-badge{
  position:absolute;top:0;right:0;font-family:'JetBrains Mono';font-size:9.5px;
  letter-spacing:.16em;font-weight:500;text-transform:uppercase;color:#06210b;
  background:linear-gradient(115deg,var(--accent-a),var(--accent-b));
  padding:4px 11px;border-bottom-left-radius:11px;
}
.feat-ico{
  width:52px;height:52px;flex:none;border-radius:14px;display:grid;place-items:center;position:relative;
  background:linear-gradient(160deg,rgba(47,139,255,.24),rgba(98,214,90,.18));
  border:1px solid var(--border-hi);color:#dcebff;
}
.feat-ico svg{width:25px;height:25px}
.live{position:absolute;top:-4px;right:-4px;width:11px;height:11px;border-radius:50%;background:var(--accent-b);border:2px solid var(--card)}
.live::before{content:"";position:absolute;inset:-3px;border-radius:50%;background:var(--accent-b);opacity:.55;animation:pulse 1.9s ease-out infinite}
@keyframes pulse{0%{transform:scale(.5);opacity:.6}100%{transform:scale(2.4);opacity:0}}
.feat-body{flex:1;min-width:0}
.feat-tag{font-family:'JetBrains Mono';font-size:10.5px;letter-spacing:.08em;color:var(--accent-b);text-transform:uppercase;margin-bottom:4px}
.feat-name{font-family:'Bricolage Grotesque';font-weight:700;font-size:17px;letter-spacing:-.01em;line-height:1.2}
.feat-desc{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.45;max-width:60ch}
.feat-go{
  flex:none;display:inline-flex;align-items:center;gap:7px;font-family:'Manrope';font-weight:600;font-size:13px;
  color:#dcebff;border:1px solid var(--border-hi);border-radius:11px;padding:10px 15px;transition:.16s;white-space:nowrap;
}
.card.feat:hover .feat-go{border-color:var(--accent-a);background:rgba(47,139,255,.14)}
.card.feat:hover .feat-go .go{color:inherit;transform:none}
@media(max-width:620px){
  .card.feat{flex-direction:column;align-items:flex-start;gap:14px}
  .feat-go{width:100%;justify-content:center}
}

/* featured2 — destaque secundário (Ofertas Ativas) */
.card.feat2{
  grid-column:1 / -1;
  border:1px solid transparent;
  background:
    linear-gradient(var(--card),var(--card)) padding-box,
    linear-gradient(115deg,rgba(98,214,90,.7),rgba(47,139,255,.5)) border-box;
  box-shadow:0 6px 28px -10px rgba(98,214,90,.25);
  padding:14px 18px;
}
.card.feat2::after{display:none}
.feat2-badge{
  position:absolute;top:0;right:0;font-family:'JetBrains Mono';font-size:9.5px;
  letter-spacing:.16em;font-weight:500;text-transform:uppercase;color:var(--bg);
  background:linear-gradient(115deg,var(--accent-b),#38b26e);
  padding:3px 10px;border-bottom-left-radius:11px;
}
.feat2-name{font-family:'Bricolage Grotesque';font-weight:700;font-size:15.5px}

/* badges (capability tags) */
.badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.badge{
  font-family:'JetBrains Mono';font-size:10.5px;letter-spacing:.04em;
  border:1px solid var(--border-hi);border-radius:7px;padding:3px 9px;
  color:var(--muted);background:var(--bg-2);
}

/* bookmarklet card */
.bm-desc{font-size:12.5px;color:var(--muted);line-height:1.5;margin-top:4px}
.bm-drag{
  display:inline-flex;align-items:center;gap:9px;margin-top:10px;
  padding:10px 14px;border-radius:11px;cursor:grab;user-select:none;
  background:linear-gradient(115deg,rgba(98,214,90,.18),rgba(47,139,255,.14));
  border:1px dashed rgba(98,214,90,.55);color:#c6f5c3;
  font-family:'JetBrains Mono';font-size:12px;font-weight:500;
  transition:.16s;text-decoration:none;
}
.bm-drag:hover{border-style:solid;border-color:var(--accent-b);box-shadow:0 4px 20px rgba(98,214,90,.2)}
.bm-drag:active{cursor:grabbing}
.bm-hint{font-family:'JetBrains Mono';font-size:10px;color:var(--muted-2);margin-top:6px}

/* credentials block */
.creds{display:flex;flex-direction:column;gap:7px;margin-top:2px}
.cred{
  display:flex;align-items:center;gap:8px;background:var(--bg-2);
  border:1px solid var(--border);border-radius:9px;padding:7px 9px;
}
.cred .lbl{font-family:'JetBrains Mono';font-size:9.5px;letter-spacing:.1em;color:var(--muted-2);text-transform:uppercase;flex:none;width:42px}
.cred .val{font-family:'JetBrains Mono';font-size:12px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cred button{
  background:none;border:none;color:var(--muted-2);cursor:pointer;flex:none;
  display:grid;place-items:center;padding:3px;border-radius:6px;transition:.14s;
}
.cred button:hover{color:var(--text);background:rgba(255,255,255,.05)}
.cred button.ok{color:var(--accent-b)}

/* ---------- skills ---------- */
.flow-note{
  font-size:12.5px;color:var(--muted);margin:-8px 0 16px;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-family:'JetBrains Mono'
}
.flow-note b{color:#bcd0ee}
.flow-note .arr{color:var(--muted-2)}
.skill{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;display:flex;flex-direction:column;gap:10px;transition:border-color .16s,background .16s;
}
.skill:hover{border-color:var(--border-glow);background:var(--card-hover)}
.skill-head{display:flex;align-items:center;gap:10px}
.skill-step{
  font-family:'JetBrains Mono';font-size:11px;width:24px;height:24px;flex:none;border-radius:7px;
  display:grid;place-items:center;background:linear-gradient(160deg,rgba(47,139,255,.22),rgba(98,214,90,.16));
  border:1px solid var(--border-hi);color:#dcebff;font-weight:500;
}
.skill-name{font-family:'Bricolage Grotesque';font-weight:700;font-size:14px}
.skill-what{font-size:12.8px;color:var(--muted);line-height:1.5}
.trigger{
  display:flex;align-items:center;gap:8px;background:var(--bg-2);
  border:1px dashed var(--border-hi);border-radius:9px;padding:8px 10px;margin-top:2px;
}
.trigger .tlbl{font-size:9.5px;font-family:'JetBrains Mono';letter-spacing:.1em;color:var(--muted-2);text-transform:uppercase;flex:none}
.trigger .tval{font-family:'JetBrains Mono';font-size:12px;color:#bcd0ee;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trigger button{background:none;border:none;color:var(--muted-2);cursor:pointer;flex:none;display:grid;place-items:center;padding:3px;border-radius:6px;transition:.14s}
.trigger button:hover{color:var(--text);background:rgba(255,255,255,.05)}
.trigger button.ok{color:var(--accent-b)}
.dl{
  margin-top:auto;display:inline-flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:9px;border-radius:10px;cursor:pointer;
  background:linear-gradient(115deg,rgba(47,139,255,.16),rgba(98,214,90,.14));
  border:1px solid var(--border-hi);color:#dcebff;
  font-family:'Manrope';font-size:12.5px;font-weight:600;transition:.16s;
}
.dl:hover{border-color:var(--border-glow);background:linear-gradient(115deg,rgba(47,139,255,.26),rgba(98,214,90,.22));transform:translateY(-1px)}
.dl.ok{color:var(--accent-b);border-color:var(--accent-b)}
.dl svg{flex:none}

/* no results */
#empty{display:none;text-align:center;color:var(--muted-2);font-family:'JetBrains Mono';font-size:13px;margin-top:60px}

footer{text-align:center;margin-top:72px;color:var(--muted-2);font-family:'JetBrains Mono';font-size:11px;letter-spacing:.2em}

@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
</style>
</head>

function credRow(c){
  const display = c.secret ? '••••••••••••' : esc(c.val);
  return `<div class="cred" data-val="${esc(c.val)}" data-secret="${c.secret?1:0}">

}

    <div class="feat-ico">${activityIco}<span class="live"></span></div>
    <div class="feat-body">
      ${t.tag?`<div class="feat-tag">${esc(t.tag)}</div>`:''}
      <div class="feat-name">${esc(t.name)}</div>
      ${t.desc?`<div class="feat-desc">${esc(t.desc)}</div>`:''}
    </div>
    <span class="feat-go">Abrir painel ${goIco}</span>
  </a>`;
}

function bookmarkletCard(t){
  return `<div class="card" style="cursor:default" data-search="${esc(t.name.toLowerCase())}">
    <div class="card-top">
      <div class="fav" style="background:linear-gradient(160deg,rgba(98,214,90,.22),rgba(47,139,255,.16));border-color:rgba(98,214,90,.3);font-size:18px">🔎</div>
      <div class="card-name">${esc(t.name)}</div>
    </div>
    ${t.desc?`<div class="bm-desc">${esc(t.desc)}</div>`:''}
    <a class="bm-drag" href="${esc(t.code)}" title="Arraste para a barra de favoritos">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 4 6v6c0 5 3.5 8 8 10 4.5-2 8-5 8-10V6z"/><circle cx="12" cy="12" r="3"/></svg>
      🔎 Espião — arrastar para favoritos
    </a>
    <div class="bm-hint">↑ arraste este botão direto para a barra de favoritos do navegador</div>
  </div>`;
}

function toolCard(t){
  if(t.featured) return featuredCard(t);
  if(t.featured2) return featured2Card(t);
  if(t.bookmarklet) return bookmarkletCard(t);
  const credsHtml = t.creds ? `<div class="creds" onclick="event.preventDefault();event.stopPropagation();">${t.creds.map(credRow).join('')}</div>` : '';
  const badgesHtml = t.badges ? `<div class="badges">${t.badges.map(b=>`<span class="badge">${esc(b)}</span>`).join('')}</div>` : '';
  const letter = t.name.trim()[0].toUpperCase();
  return `<a class="card" href="${t.url}" target="_blank" rel="noopener noreferrer" data-search="${esc((t.name+' '+host(t.url)).toLowerCase())}">
    <div class="card-top">
      <div class="fav"><img src="${favUrl(t.url)}" alt="" onerror="this.replaceWith(document.createTextNode('${letter}'))"><span style="display:none">${letter}</span></div>
      <div class="card-name">${esc(t.name)}</div>
      <span class="go">${goIco}</span>
    </div>
    ${credsHtml}
    ${badgesHtml}
  </a>`;
}

function skillCard(s){
  return `<div class="skill" data-search="${esc((s.name+' '+s.trigger).toLowerCase())}">
    <div class="skill-head"><span class="skill-step">${s.step}</span><span class="skill-name">${esc(s.name)}</span></div>
    <div class="skill-what">${esc(s.what)}</div>
    <div class="trigger" data-val="${esc(s.trigger)}">
      <span class="tlbl">TRIGGER</span>
      <span class="tval">"${esc(s.trigger)}"</span>
      <button class="cp" title="Copiar trigger">${copyIco}</button>
    </div>
    <button class="dl" data-file="${esc(s.file)}">${dlIco}<span>Baixar SKILL.md</span></button>
  </div>`;
}

const goIco   = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17 17 7M9 7h8v8"/></svg>';
const copyIco = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>';
const eyeIco  = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>';
const okIco   = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="m20 6-11 11-5-5"/></svg>';
const dlIco   = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0 4-4m-4 4-4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>';
const activityIco = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg>';

DATA.forEach((sec,i)=>{
  const isSkill = !!sec.skills;
  const items = isSkill ? sec.skills : sec.tools;
  const count = items.length;
  const sectionEl = document.createElement('section');
  sectionEl.className = 'sec';
  sectionEl.style.animationDelay = (0.12 + i*0.06)+'s';
  sectionEl.innerHTML = `
    <div class="sec-head">
      <div class="sec-ico">${sec.icon}</div>
      <div class="sec-meta"><h2>${sec.title}</h2><p>${sec.subtitle}</p></div>
      <span class="sec-count">${String(count).padStart(2,'0')}</span>
    </div>
    ${sec.flow ? `<div class="flow-note">${sec.flow}</div>` : ``}
    <div class="grid">${ items.map(isSkill?skillCard:toolCard).join('') }</div>`;
  board.appendChild(sectionEl);
});

/* ---------- copy + reveal ---------- */
document.addEventListener('click', e=>{
  const cp = e.target.closest('.cp');
  if(cp){
    e.preventDefault(); e.stopPropagation();
    const holder = cp.closest('[data-val]');
    navigator.clipboard.writeText(holder.dataset.val);
    cp.classList.add('ok'); cp.innerHTML = okIco;
    setTimeout(()=>{ cp.classList.remove('ok'); cp.innerHTML = copyIco; }, 1100);
    return;
  }
  const rev = e.target.closest('.rev');
  if(rev){
    e.preventDefault(); e.stopPropagation();
    const row = rev.closest('.cred'); const val = row.querySelector('.val');
    if(row.dataset.shown==="1"){ val.textContent='••••••••••••'; row.dataset.shown="0"; }
    else { val.textContent = row.dataset.val; row.dataset.shown="1"; }
  }
  const dl = e.target.closest('.dl');
  if(dl){
    e.preventDefault(); e.stopPropagation();
    const key = dl.dataset.file;
    const b64 = SKILLS_MD[key];
    if(!b64){ alert('Arquivo da skill não encontrado.'); return; }
    const bytes = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
    const blob = new Blob([bytes], {type:'text/markdown'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = key + '-SKILL.md';
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 200);
    dl.classList.add('ok');
    const span = dl.querySelector('span'); const prev = span.textContent;
    span.textContent = 'Baixado ✓';
    setTimeout(()=>{ dl.classList.remove('ok'); span.textContent = prev; }, 1400);
  }
});

/* ---------- live search ---------- */
const q = document.getElementById('q');
const empty = document.getElementById('empty');
q.addEventListener('input', ()=>{
  const term = q.value.trim().toLowerCase();
  let anyVisible = false;
  document.querySelectorAll('.sec').forEach(sec=>{
    let secHas = false;
    sec.querySelectorAll('[data-search]').forEach(card=>{
      const match = !term || card.dataset.search.includes(term);
      card.style.display = match ? '' : 'none';
      if(match) secHas = true;
    });
    sec.style.display = secHas ? '' : 'none';
    if(secHas) anyVisible = true;
  });
  empty.style.display = anyVisible ? 'none' : 'block';
});
</script>
</body>
</html>
